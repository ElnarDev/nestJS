<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>GlassKeep - Menú Contextual</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --glass-bg: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.16);
    --accent: #a78bfa;
    --text: rgba(255,255,255,0.92);
    --text-muted: rgba(255,255,255,0.45);
    --shadow: 0 8px 32px rgba(0,0,0,0.35);
  }
  body { font-family: 'Outfit', sans-serif; min-height: 100vh; background: linear-gradient(135deg, #0f0c29 0%, #1a0533 30%, #0c2340 60%, #041024 100%); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.35; pointer-events: none; }
  .blob1 { width: 500px; height: 500px; background: radial-gradient(circle, #7c3aed, transparent); top: -100px; left: -100px; }
  .blob2 { width: 400px; height: 400px; background: radial-gradient(circle, #0ea5e9, transparent); bottom: 50px; right: 50px; }

  .scene { position: relative; width: 520px; display: flex; flex-direction: column; gap: 0; }

  /* Note card (behind) */
  .note-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 16px; backdrop-filter: blur(20px);
    overflow: hidden; box-shadow: var(--shadow);
    filter: brightness(0.7);
  }
  .card-image-area { background: linear-gradient(135deg, #1a1040, #0c1830); height: 180px; display:flex; align-items:center; justify-content:center; font-size:100px; }
  .card-body { padding: 14px 16px; }
  .card-title { color: var(--text); font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .card-sub { color: var(--text-muted); font-size: 13px; }
  .card-footer-bar { display: flex; gap: 4px; padding: 8px 12px; }
  .cfoot-btn { width: 30px; height: 30px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .cfoot-btn.active { background: rgba(167,139,250,0.25); border: 1px solid rgba(167,139,250,0.4); }

  /* Context menu */
  .context-menu {
    position: absolute;
    bottom: calc(100% - 270px);
    left: 60px;
    width: 260px;
    background: rgba(20, 16, 50, 0.85);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    backdrop-filter: blur(40px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
    overflow: hidden;
    z-index: 20;
  }
  .menu-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 18px; cursor: pointer; font-size: 14px; color: var(--text-muted);
    transition: all 0.15s; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .menu-item.danger { color: rgba(248,113,113,0.7); }
  .menu-item.danger:hover { background: rgba(239,68,68,0.1); color: #f87171; }
  .menu-item.highlighted { color: var(--accent); background: rgba(167,139,250,0.08); }
  .menu-item .item-icon { width: 18px; height: 18px; flex-shrink: 0; display: flex; align-items:center; justify-content:center; }
  .menu-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 0; }

  /* Active trigger button */
  .trigger-btn {
    position: absolute; bottom: 54px; left: 262px;
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(167,139,250,0.5);
    background: rgba(167,139,250,0.2); backdrop-filter: blur(10px);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 16px rgba(167,139,250,0.3);
    z-index: 10;
  }
  .trigger-tooltip {
    position: absolute; bottom: 44px; left: 256px;
    background: rgba(0,0,0,0.8); color: var(--text); font-size: 12px;
    padding: 4px 10px; border-radius: 8px; white-space: nowrap;
    backdrop-filter: blur(8px);
  }
</style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="scene">
    <!-- Note card background -->
    <div class="note-card">
      <div class="card-image-area">🦸</div>
      <div class="card-body">
        <div class="card-title">Dibujos</div>
        <div class="card-sub">Serie animada</div>
      </div>
      <div class="card-footer-bar">
        <button class="cfoot-btn">🎨</button>
        <button class="cfoot-btn">🔔</button>
        <button class="cfoot-btn">👤</button>
        <button class="cfoot-btn">🖼</button>
        <button class="cfoot-btn active">⋯</button>
      </div>
    </div>

    <!-- Trigger button active -->
    <div class="trigger-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2"><circle cx="12" cy="5" r="1" fill="#a78bfa"/><circle cx="12" cy="12" r="1" fill="#a78bfa"/><circle cx="12" cy="19" r="1" fill="#a78bfa"/></svg>
    </div>
    <div class="trigger-tooltip">Más</div>

    <!-- Context menu -->
    <div class="context-menu">
      <div class="menu-item danger">
        <div class="item-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></div>
        Borrar la nota
      </div>
      <div class="menu-item">
        <div class="item-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></div>
        Agregar etiqueta
      </div>
      <div class="menu-item highlighted">
        <div class="item-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div>
        Agregar dibujo
      </div>
      <div class="menu-item highlighted">
        <div class="item-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></div>
        Hacer una copia
      </div>
      <div class="menu-divider"></div>
      <div class="menu-item">
        <div class="item-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
        Mostrar casillas
      </div>
      <div class="menu-item">
        <div class="item-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
        Guardar texto imagen
      </div>
      <div class="menu-item">
        <div class="item-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        Copiar en Docs
      </div>
      <div class="menu-item">
        <div class="item-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        Historial de versiones
      </div>
    </div>
  </div>
</body>
</html>
