<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>GlassKeep - Editor Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --glass-bg: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.16);
    --accent: #a78bfa;
    --text: rgba(255,255,255,0.92);
    --text-muted: rgba(255,255,255,0.45);
    --shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  body { font-family: 'Outfit', sans-serif; min-height: 100vh; background: linear-gradient(135deg, #0f0c29 0%, #1a0533 30%, #0c2340 60%, #041024 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.35; pointer-events: none; }
  .blob1 { width: 500px; height: 500px; background: radial-gradient(circle, #7c3aed, transparent); top: -100px; left: -100px; }
  .blob2 { width: 400px; height: 400px; background: radial-gradient(circle, #0ea5e9, transparent); bottom: 50px; right: 50px; }
  .blob3 { width: 350px; height: 350px; background: radial-gradient(circle, #ec4899, transparent); top: 100px; right: 200px; opacity: 0.25; }

  /* Overlay */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }

  /* Modal editor */
  .editor-modal {
    position: relative; z-index: 10;
    width: 500px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 20px;
    backdrop-filter: blur(40px);
    box-shadow: 0 24px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .title-input { background: none; border: none; outline: none; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 600; width: 100%; }
  .title-input::placeholder { color: var(--text-muted); font-weight: 400; }
  .pin-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; }
  .pin-btn:hover { background: rgba(255,255,255,0.1); }

  .checklist { padding: 12px 20px; }
  .check-row {
    display: flex; align-items: center; gap: 12px; padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .drag-handle { cursor: grab; opacity: 0; transition: opacity 0.2s; display: flex; align-items: center; }
  .check-row:hover .drag-handle { opacity: 0.5; }
  .drag-handle svg { stroke: var(--text-muted); }
  .check-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
  .check-row .item-input { background: none; border: none; outline: none; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 14px; flex: 1; }
  .check-row .item-input::placeholder { color: var(--text-muted); }
  .delete-btn { width: 24px; height: 24px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
  .check-row:hover .delete-btn { opacity: 0.6; }
  .delete-btn:hover { background: rgba(239,68,68,0.15); opacity: 1 !important; }

  .add-item { display: flex; align-items: center; gap: 12px; padding: 10px 20px 14px; cursor: pointer; }
  .add-item span { color: var(--text-muted); font-size: 14px; }
  .add-item:hover span { color: var(--text); }

  .modal-footer {
    display: flex; align-items: center; padding: 10px 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
    gap: 4px;
  }
  .foot-icon { width: 34px; height: 34px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .foot-icon:hover { background: rgba(255,255,255,0.1); }
  .foot-icon svg { stroke: var(--text-muted); }
  .spacer { flex: 1; }
  .undo-redo { display: flex; gap: 2px; }
  .close-btn {
    padding: 7px 20px; border-radius: 10px; border: none;
    background: rgba(167,139,250,0.2);
    border: 1px solid rgba(167,139,250,0.35);
    color: var(--accent); font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .close-btn:hover { background: rgba(167,139,250,0.35); }

  /* Tooltip hint */
  .assign-hint { text-align: center; padding: 0 20px 8px; font-size: 11px; color: var(--text-muted); }

  /* Context background notes (blurred) */
  .bg-note { position: fixed; border-radius: 16px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(8px); opacity: 0.4; }
  .bg-note1 { width: 220px; height: 280px; top: 120px; left: 80px; transform: rotate(-5deg); }
  .bg-note2 { width: 180px; height: 200px; bottom: 150px; right: 100px; transform: rotate(4deg); }
</style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="bg-note bg-note1"></div>
  <div class="bg-note bg-note2"></div>
  <div class="overlay"></div>

  <div class="editor-modal">
    <div class="modal-header">
      <input class="title-input" type="text" placeholder="Título" value="Compra de PC">
      <button class="pin-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>
      </button>
    </div>

    <div class="checklist">
      <div class="check-row">
        <div class="drag-handle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="9" cy="6" r="1" fill="currentColor"/><circle cx="15" cy="6" r="1" fill="currentColor"/><circle cx="9" cy="12" r="1" fill="currentColor"/><circle cx="15" cy="12" r="1" fill="currentColor"/><circle cx="9" cy="18" r="1" fill="currentColor"/><circle cx="15" cy="18" r="1" fill="currentColor"/></svg></div>
        <input type="checkbox">
        <input class="item-input" type="text" value="Monitor 24">
        <button class="delete-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="check-row">
        <div class="drag-handle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="9" cy="6" r="1" fill="currentColor"/><circle cx="15" cy="6" r="1" fill="currentColor"/><circle cx="9" cy="12" r="1" fill="currentColor"/><circle cx="15" cy="12" r="1" fill="currentColor"/><circle cx="9" cy="18" r="1" fill="currentColor"/><circle cx="15" cy="18" r="1" fill="currentColor"/></svg></div>
        <input type="checkbox">
        <input class="item-input" type="text" value="CPU">
        <button class="delete-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="check-row">
        <div class="drag-handle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="9" cy="6" r="1" fill="currentColor"/><circle cx="15" cy="6" r="1" fill="currentColor"/><circle cx="9" cy="12" r="1" fill="currentColor"/><circle cx="15" cy="12" r="1" fill="currentColor"/><circle cx="9" cy="18" r="1" fill="currentColor"/><circle cx="15" cy="18" r="1" fill="currentColor"/></svg></div>
        <input type="checkbox">
        <input class="item-input" type="text" value="TECLADO">
        <button class="delete-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="check-row">
        <div class="drag-handle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="9" cy="6" r="1" fill="currentColor"/><circle cx="15" cy="6" r="1" fill="currentColor"/><circle cx="9" cy="12" r="1" fill="currentColor"/><circle cx="15" cy="12" r="1" fill="currentColor"/><circle cx="9" cy="18" r="1" fill="currentColor"/><circle cx="15" cy="18" r="1" fill="currentColor"/></svg></div>
        <input type="checkbox">
        <input class="item-input" type="text" value="MOUSE">
        <button class="delete-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="check-row">
        <div class="drag-handle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="9" cy="6" r="1" fill="currentColor"/><circle cx="15" cy="6" r="1" fill="currentColor"/><circle cx="9" cy="12" r="1" fill="currentColor"/><circle cx="15" cy="12" r="1" fill="currentColor"/><circle cx="9" cy="18" r="1" fill="currentColor"/><circle cx="15" cy="18" r="1" fill="currentColor"/></svg></div>
        <input type="checkbox">
        <input class="item-input" type="text" value="PARLANTES">
        <button class="delete-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
    </div>

    <div class="add-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Elemento de la lista</span>
    </div>

    <div class="modal-footer">
      <button class="foot-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.5)"/><line x1="12" y1="8" x2="12" y2="12" stroke="rgba(255,255,255,0.5)"/><line x1="12" y1="16" x2="12.01" y2="16" stroke="rgba(255,255,255,0.5)"/></svg>
      </button>
      <button class="foot-icon" title="Color">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="13.5" cy="6.5" r=".5" fill="#a78bfa" stroke="#a78bfa"/><circle cx="17.5" cy="10.5" r=".5" fill="#38bdf8" stroke="#38bdf8"/><circle cx="8.5" cy="7.5" r=".5" fill="#ec4899" stroke="#ec4899"/><circle cx="6.5" cy="12.5" r=".5" fill="#10b981" stroke="#10b981"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z" stroke="rgba(255,255,255,0.5)"/></svg>
      </button>
      <button class="foot-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
      <button class="foot-icon" style="border: 1px solid rgba(167,139,250,0.4); background: rgba(167,139,250,0.15);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      </button>
      <button class="foot-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <button class="foot-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/></svg>
      </button>
      <button class="foot-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      </button>
      <div class="spacer"></div>
      <div class="undo-redo">
        <button class="foot-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg></button>
        <button class="foot-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.5"/></svg></button>
      </div>
      <button class="close-btn">Cerrar</button>
    </div>
    <p class="assign-hint" style="color: rgba(167,139,250,0.5); font-size: 11px; padding-bottom:10px;">Asignar como tarea</p>
  </div>
</body>
</html>
