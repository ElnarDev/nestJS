<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>GlassKeep - Nota con Imagen</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --glass-bg: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.16);
    --accent: #a78bfa;
    --text: rgba(255,255,255,0.92);
    --text-muted: rgba(255,255,255,0.45);
  }
  body { font-family: 'Outfit', sans-serif; min-height: 100vh; background: linear-gradient(135deg, #0f0c29 0%, #1a0533 30%, #0c2340 60%, #041024 100%); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.35; pointer-events: none; }
  .blob1 { width: 500px; height: 500px; background: radial-gradient(circle, #7c3aed, transparent); top: -100px; left: -100px; }
  .blob2 { width: 400px; height: 400px; background: radial-gradient(circle, #0ea5e9, transparent); bottom: 50px; right: 50px; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px); }

  .editor-modal {
    position: relative; z-index: 10;
    width: 460px;
    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    backdrop-filter: blur(40px);
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.12);
    overflow: hidden;
  }

  /* Image area */
  .image-area {
    position: relative;
    background: linear-gradient(160deg, #1a1040 0%, #0c1830 50%, #1a0020 100%);
    height: 360px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .image-area::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(167,139,250,0.15) 0%, transparent 70%); }
  .cartoon-figure {
    font-size: 180px; line-height: 1;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
    position: relative; z-index: 1;
    user-select: none;
  }
  .image-overlay-btn {
    position: absolute; top: 12px; right: 12px; z-index: 2;
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .image-border-glow { position: absolute; inset: 0; border: 2px solid rgba(167,139,250,0.3); border-radius: 0; pointer-events: none; }

  .modal-body { padding: 16px 20px 8px; }
  .note-title { color: var(--text); font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .note-subtitle { color: var(--text-muted); font-size: 14px; }
  .edit-time { text-align: right; color: var(--text-muted); font-size: 11px; margin: 6px 0; opacity: 0.6; }

  .modal-footer {
    display: flex; align-items: center; padding: 10px 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
    gap: 4px;
  }
  .foot-icon { width: 34px; height: 34px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .foot-icon:hover { background: rgba(255,255,255,0.1); }
  .foot-icon svg { stroke: var(--text-muted); }
  .spacer { flex: 1; }
  .close-btn {
    padding: 7px 20px; border-radius: 10px; border: none;
    background: rgba(167,139,250,0.2);
    border: 1px solid rgba(167,139,250,0.35);
    color: var(--accent); font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer;
  }

  /* Floating label badge */
  .label-badge {
    position: absolute; bottom: 12px; left: 12px; z-index: 2;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
    padding: 4px 12px; font-size: 12px; color: var(--text);
  }
</style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="overlay"></div>

  <div class="editor-modal">
    <!-- Image area -->
    <div class="image-area">
      <div class="image-border-glow"></div>
      <div class="cartoon-figure">🦸</div>
      <button class="image-overlay-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="label-badge">🎨 Arte · Dibujo</div>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <div class="note-title">Dibujos</div>
      <div class="note-subtitle">Serie animada</div>
      <div class="edit-time">Editado: 6:06 p.m.</div>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="foot-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg></button>
      <button class="foot-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="13.5" cy="6.5" r=".5" fill="#a78bfa" stroke="#a78bfa"/><circle cx="17.5" cy="10.5" r=".5" fill="#38bdf8" stroke="#38bdf8"/><circle cx="8.5" cy="7.5" r=".5" fill="#ec4899" stroke="#ec4899"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z" stroke="rgba(255,255,255,0.5)"/></svg></button>
      <button class="foot-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>
      <button class="foot-icon" style="border: 1px solid rgba(167,139,250,0.4); background: rgba(167,139,250,0.15);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      </button>
      <button class="foot-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
      <button class="foot-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/></svg></button>
      <button class="foot-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button>
      <div class="spacer"></div>
      <button class="foot-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg></button>
      <button class="foot-icon" style="opacity:0.3"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.5"/></svg></button>
      <button class="close-btn">Cerrar</button>
    </div>
  </div>
</body>
</html>
