<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="card">

    <h1>Notas test</h1>
    <div class="card flex justify-center">
        <p-datepicker [(ngModel)]="date" dateFormat="dd/mm/yy"></p-datepicker>
    </div>

    <p-table [value]="dataTest" [tableStyle]="{ 'min-width': '50rem' }">
                <ng-template #header>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Content</th>
                        <th>Created At</th>
                        <th>Updated At</th>
                        <th>Actions</th>
                    </tr>
                </ng-template>
                <ng-template #body let-nota>
                    <tr>
                        <td>{{ nota.id }}</td>
                        <td>{{ nota.title }}</td>
                        <td>{{ nota.content }}</td>
                        <td>{{ nota.createdAt | date:'dd/MM/yyyy HH:mm:ss' }}</td>
                        <td>{{ nota.updatedAt | date:'dd/MM/yyyy HH:mm:ss' }}</td>
                        <td>
                            <p-button icon="pi pi-pencil" (click)="udpateNotaTest(nota, $event)" [text]="true" severity="info"></p-button>
                            <p-button icon="pi pi-trash" (click)="deleteNotaTest(nota, $event)" [text]="true" severity="danger"></p-button>
                        </td>

                    </tr>
                </ng-template>
            </p-table>
</div>
